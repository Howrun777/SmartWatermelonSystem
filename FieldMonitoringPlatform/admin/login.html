<!-- admin/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员登录 - 瓜田监测可视化平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>🍉 瓜田数据处理中心</h2>
            <p style="margin-bottom: 20px; color: #888; font-size: 0.9rem;">请使用管理员账号登录</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>账号 (Username)</label>
                    <input type="text" id="username" value="admin" required>
                    <!--<input type="text" id="username" placeholder="请输入管理员账号" required>-->
                </div>
                <div class="input-group">
                    <label>密码 (Password)</label>
                    <input type="password" id="password" value="admin123" required>
                    <!--<input type="password" id="password" placeholder="请输入密码" required>-->
                </div>
                
                <div id="error-msg">账号或密码错误</div>
                
                <button type="submit" class="btn" style="width: 100%;">登 录</button>
            </form>
            
            <div style="margin-top: 20px; font-size: 0.85rem;">
                <a href="../index.html" style="color: var(--primary-color); text-decoration: none;">← 返回官网首页</a>
            </div>
        </div>
    </div>

    <!-- 引入 API 文件 -->
    <script src="js/api.js"></script>
    <script>
        // 监听表单提交事件
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止网页默认刷新
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // 调用 api.js 中的 login 函数
            login(user, pass);
        });
    </script>
</body>
</html>
